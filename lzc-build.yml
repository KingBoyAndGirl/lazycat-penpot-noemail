# LazyCat 构建配置 — Penpot (No-Email Edition)
buildscript: ":"
manifest: ./lzc-manifest.yml
contentdir: ./content
pkgout: ./lpk
icon: ./lzc-icon.png

actions:
  prebuild:
    - mkdir -p ./content ./lpk

resource_exports:
  - kind: mcp-providers
    source: ./resources/mcp-providers
  - kind: skills
    source: ./resources/skills

compose_override:
  services:
    penpot-init:
      volumes:
        - type: bind
          source: /lzcapp/pkg/content/init-admin.py
          target: /scripts/init-admin.py
