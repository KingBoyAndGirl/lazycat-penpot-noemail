# LazyCat 构建配置 — Penpot (No-Email Edition)
buildscript: ":"
manifest: ./lzc-manifest.yml
contentdir: ./content
pkgout: ./lpk
icon: ./lzc-icon.png

actions:
  prebuild:
    - mkdir -p ./content ./lpk

resource_exports:
  - kind: skills
    source: ./resources/skills

compose_override:
  services:
    penpot-frontend:
      volumes:
        - type: bind
          source: /lzcapp/pkg/content/mcp-custom.conf
          target: /etc/nginx/overrides/server.d/mcp-custom.conf
