<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Penpot 邀请收件箱</title>
  <style>
    :root{--bg:#f5f3ff;--card:#fff;--text:#18181b;--muted:#71717a;--line:#e4e4e7;--primary:#7c3aed;--primary-dark:#6d28d9;--primary-soft:#ede9fe;--danger-soft:#fef2f2;--danger:#dc2626;--ok-soft:#ecfdf5;--ok:#059669;--shadow:0 20px 60px rgba(67,56,202,.14);--radius:24px;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;color:var(--text);min-height:100vh;background:radial-gradient(circle at 12% 0%,rgba(124,58,237,.18),transparent 32rem),radial-gradient(circle at 90% 12%,rgba(14,165,233,.14),transparent 28rem),linear-gradient(180deg,#faf9ff 0%,#f4f4f5 100%)}a{color:inherit}.shell{max-width:1180px;margin:0 auto;padding:32px 20px 48px}.hero{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:24px;align-items:center;margin-bottom:22px}.brand{display:flex;align-items:center;gap:14px}.logo{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;background:#111827;color:white;box-shadow:var(--shadow);font-weight:800;letter-spacing:-.05em}h1{margin:0;font-size:clamp(28px,4vw,42px);letter-spacing:-.04em;line-height:1.06}.subtitle{margin:8px 0 0;color:var(--muted);font-size:15px;line-height:1.65}.hero-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}button,.btn{border:0;border-radius:999px;padding:11px 16px;cursor:pointer;font-weight:700;font-size:14px;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:transform .14s ease,box-shadow .14s ease,background .14s ease;white-space:nowrap}button:hover,.btn:hover{transform:translateY(-1px)}button:disabled{opacity:.55;cursor:not-allowed}.btn-primary{background:var(--primary);color:#fff;box-shadow:0 12px 30px rgba(124,58,237,.24)}.btn-primary:hover{background:var(--primary-dark)}.btn-ghost{background:rgba(255,255,255,.74);color:#3f3f46;border:1px solid rgba(228,228,231,.9)}.grid{display:grid;grid-template-columns:360px minmax(0,1fr);gap:18px;align-items:start}.panel{background:rgba(255,255,255,.88);border:1px solid rgba(228,228,231,.82);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;backdrop-filter:blur(18px)}.toolbar{padding:16px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center}.search{width:100%;border:1px solid var(--line);background:#fff;border-radius:999px;padding:11px 14px;outline:none;font-size:14px}.search:focus{border-color:#a78bfa;box-shadow:0 0 0 4px rgba(124,58,237,.1)}.list{max-height:720px;overflow:auto}.empty{padding:34px 22px;color:var(--muted);text-align:center;line-height:1.7}.item{width:100%;text-align:left;border:0;border-radius:0;padding:16px;background:transparent;display:block;border-bottom:1px solid #f1f1f3}.item:hover{background:#fafafa;transform:none}.item.active{background:linear-gradient(90deg,var(--primary-soft),#fff);box-shadow:inset 4px 0 0 var(--primary)}.item-top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:8px}.badge{font-size:12px;font-weight:800;border-radius:999px;padding:5px 9px;background:var(--primary-soft);color:var(--primary-dark)}.badge.verify{background:var(--ok-soft);color:var(--ok)}.to{font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.subject{color:#3f3f46;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.time{color:var(--muted);font-size:12px;margin-top:6px}.detail{min-height:640px}.notice{margin:18px;padding:14px 16px;border-radius:18px;background:var(--danger-soft);color:#7f1d1d;border:1px solid #fecaca;line-height:1.6}.notice strong{color:var(--danger)}.detail-head{padding:26px 28px 18px;border-bottom:1px solid var(--line)}.kicker{color:var(--primary);font-size:13px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}.detail h2{margin:8px 0 12px;font-size:clamp(26px,3vw,38px);line-height:1.1;letter-spacing:-.04em}.meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:16px}.meta-card{border:1px solid var(--line);background:#fafafa;border-radius:16px;padding:12px}.label{color:var(--muted);font-size:12px;margin-bottom:4px}.value{font-weight:800;word-break:break-word}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.preview-wrap{padding:18px;background:#f8fafc}.preview-title{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:13px;font-weight:800;margin:2px 0 12px;gap:14px}iframe{width:100%;min-height:520px;border:1px solid var(--line);border-radius:18px;background:white}.plain{white-space:pre-wrap;padding:18px;background:#fff;border:1px solid var(--line);border-radius:18px;color:#3f3f46;line-height:1.7}.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#111827;color:white;padding:12px 16px;border-radius:999px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .2s ease,transform .2s ease;z-index:20}.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}@media(max-width:900px){.hero{grid-template-columns:1fr}.hero-actions{justify-content:flex-start}.grid{grid-template-columns:1fr}.meta{grid-template-columns:1fr}.list{max-height:360px}}
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero"><div class="brand"><div class="logo">P</div><div><h1>Penpot 邀请收件箱</h1><p class="subtitle">这里展示 Penpot 发出的注册验证和团队邀请邮件。点击邮件后直接复制或打开验证链接，不再在原始 MailCatcher 界面里找按钮。</p></div></div><div class="hero-actions"><button class="btn-ghost" id="refreshBtn">刷新邮件</button><a class="btn btn-ghost" href="/mailcatch/raw/" target="_blank" rel="noreferrer">原始 MailCatcher</a></div></section>
    <section class="grid"><aside class="panel"><div class="toolbar"><input id="search" class="search" placeholder="搜索收件人、主题..." /></div><div id="list" class="list"><div class="empty">正在读取邮件...</div></div></aside><main class="panel detail"><div class="notice"><strong>遇到 “This invitation is for a different email”：</strong> 说明当前 Penpot 浏览器会话登录的账号和这封邀请的收件邮箱不一致。请先退出 Penpot，再用邮件里的收件账号登录；或者用无痕窗口打开邀请链接。</div><div id="detail"><div class="empty">请选择左侧一封邮件。</div></div></main></section>
  </div><div id="toast" class="toast">已复制</div>
  <script>
    const state={messages:[],selected:null,details:new Map(),query:''};const $=id=>document.getElementById(id);const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));const cleanAddr=v=>String(v||'').replace(/[<>]/g,'');const fmtTime=s=>s?new Date(s).toLocaleString('zh-CN',{hour12:false}):'';function kind(m){return/verify/i.test(m.subject)?'verify':(/invite|invited|邀请/i.test(m.subject)?'invite':'mail')}function kindText(k){return k==='verify'?'注册验证':k==='invite'?'团队邀请':'邮件'}function toast(msg='已复制'){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}async function loadMessages(){$('list').innerHTML='<div class="empty">正在读取邮件...</div>';const res=await fetch('/mailcatch/messages',{cache:'no-store'});if(!res.ok)throw new Error('读取邮件失败: '+res.status);state.messages=await res.json();state.messages.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));if(!state.selected&&state.messages[0])state.selected=state.messages[0].id;renderList();if(state.selected)await selectMessage(state.selected)}function filtered(){const q=state.query.trim().toLowerCase();if(!q)return state.messages;return state.messages.filter(m=>[m.subject,m.sender,...(m.recipients||[])].join(' ').toLowerCase().includes(q))}function renderList(){const rows=filtered();if(!rows.length){$('list').innerHTML='<div class="empty">没有匹配的邮件。</div>';return}$('list').innerHTML=rows.map(m=>{const k=kind(m);return `<button class="item ${state.selected===m.id?'active':''}" onclick="selectMessage(${m.id})"><div class="item-top"><span class="badge ${k}">${kindText(k)}</span><span class="time">${esc(fmtTime(m.created_at))}</span></div><div class="to">${esc((m.recipients||[]).map(cleanAddr).join(', '))}</div><div class="subject">${esc(m.subject)}</div></button>`}).join('')}async function getText(id,format){const res=await fetch(`/mailcatch/messages/${id}.${format}`,{cache:'no-store'});if(!res.ok)return'';return await res.text()}function extractLink(text){const m=String(text||'').match(/https?:\/\/[^\s"'<>]+#\/auth\/verify-token\?token=[^\s"'<>]+/i)||String(text||'').match(/https?:\/\/[^\s"'<>]+/i);return m?m[0]:''}async function selectMessage(id){state.selected=id;renderList();const m=state.messages.find(x=>x.id===id);if(!m)return;$('detail').innerHTML='<div class="empty">正在加载邮件内容...</div>';let d=state.details.get(id);if(!d){const[plain,html]=await Promise.all([getText(id,'plain'),getText(id,'html')]);d={plain,html,link:extractLink(plain||html)};state.details.set(id,d)}const email=(m.recipients||[]).map(cleanAddr).join(', ');const k=kind(m);const title=k==='verify'?'完成邮箱验证':k==='invite'?'接受团队邀请':'查看邮件';const sub=k==='verify'?'用这个收件邮箱登录或注册 Penpot，然后打开验证链接。':'先确认当前 Penpot 登录账号与收件邮箱一致，再打开邀请链接。';$('detail').innerHTML=`<div class="detail-head"><div class="kicker">${esc(kindText(k))}</div><h2>${esc(title)}</h2><p class="subtitle">${esc(sub)}</p><div class="meta"><div class="meta-card"><div class="label">收件邮箱</div><div class="value">${esc(email)}</div></div><div class="meta-card"><div class="label">主题</div><div class="value">${esc(m.subject)}</div></div><div class="meta-card"><div class="label">发件人</div><div class="value">${esc(cleanAddr(m.sender))}</div></div><div class="meta-card"><div class="label">收到时间</div><div class="value">${esc(fmtTime(m.created_at))}</div></div></div><div class="actions">${d.link?`<a class="btn btn-primary" href="${esc(d.link)}" target="_blank" rel="noreferrer">打开链接</a><button class="btn-ghost" onclick="copyTextFromDetail()">复制链接</button>`:'<button class="btn-ghost" disabled>未找到链接</button>'}<a class="btn btn-ghost" href="/mailcatch/messages/${m.id}.html" target="_blank" rel="noreferrer">打开原始邮件</a></div></div><div class="preview-wrap"><div class="preview-title"><span>邮件文本</span><span>如果按钮报账号不一致，请退出 Penpot 或用无痕窗口打开</span></div><div class="plain">${esc(d.plain||'没有可预览内容')}</div></div>`}async function copyTextFromDetail(){const d=state.details.get(state.selected);if(d&&d.link){await navigator.clipboard.writeText(d.link);toast('邀请链接已复制')}}$('search').addEventListener('input',e=>{state.query=e.target.value;renderList()});$('refreshBtn').addEventListener('click',()=>loadMessages().catch(e=>{$('list').innerHTML=`<div class="empty">${esc(e.message)}</div>`}));loadMessages().catch(e=>{$('list').innerHTML=`<div class="empty">${esc(e.message)}</div>`});window.selectMessage=selectMessage;window.copyTextFromDetail=copyTextFromDetail;
  </script>
</body>
</html>
