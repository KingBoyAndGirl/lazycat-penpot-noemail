name: Check Penpot upgrade

on:
  workflow_dispatch: {}
  schedule:
    # 北京时间每天 10:00 检查一次
    - cron: '0 2 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    name: Check upstream and prepare upgrade PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check upstream Penpot release
        id: check
        run: python3 -u .github/scripts/check-penpot-version.py

      - name: Create or update upgrade PR
        id: create-pr
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_VERSION: ${{ steps.check.outputs.upstream_version }}
          CURRENT_VERSION: ${{ steps.check.outputs.current_version }}
        run: |
          set -euo pipefail

          BRANCH="automation/penpot-${UPSTREAM_VERSION}"
          TITLE="feat: Penpot 上游更新至 ${UPSTREAM_VERSION}"
          BODY_FILE="$(mktemp)"

          cat > "$BODY_FILE" <<EOF
          自动检查发现 Penpot 有新版本。

          - 上游版本：\`${UPSTREAM_VERSION}\`
          - 当前追踪版本：\`${CURRENT_VERSION}\`
          - 上游 Release：https://github.com/penpot/penpot/releases/tag/${UPSTREAM_VERSION}

          ⚠️ **本 PR 仅更新追踪版本号，不包含镜像变更。**

          需要人工完成以下步骤：
          1. 检查懒猫 Registry 是否有对应的新镜像（\`zeroc/penpotapp/frontend\`、\`zeroc/zeroc0077/backend\`、\`zeroc/penpotapp/exporter\`）
          2. 更新 \`lzc-manifest.yml\` 中的镜像 tag
          3. 更新 \`CHANGELOG.md\`
          4. 本地测试 LPK
          5. 合并 PR → 自动发布新 LPK
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH"
          git fetch origin "$BRANCH" || true
          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            git stash push --include-untracked --message "upgrade-pr-sync-${UPSTREAM_VERSION}"
            git reset --hard "refs/remotes/origin/$BRANCH"
            git stash pop || true
          fi
          git add UPSTREAM_VERSION CHANGELOG.md

          if git diff --cached --quiet; then
            echo "No metadata changes staged; continuing to PR sync."
          else
            git commit -m "$TITLE"
            git push --force-with-lease origin "$BRANCH"
          fi

          BRANCH="$BRANCH" TITLE="$TITLE" BODY_FILE="$BODY_FILE" python3 - <<'PYEOF'
          import json, os, urllib.parse, urllib.error, urllib.request

          repo = os.environ['GITHUB_REPOSITORY']
          owner = repo.split('/', 1)[0]
          branch = os.environ['BRANCH']
          title = os.environ['TITLE']
          body = open(os.environ['BODY_FILE'], encoding='utf-8').read()
          token = os.environ['GITHUB_TOKEN']
          api = f'https://api.github.com/repos/{repo}'
          headers = {
              'Authorization': f'token {token}',
              'Accept': 'application/vnd.github+json',
              'User-Agent': 'Penpot-Agent-Workflow',
          }

          def req(method, url, payload=None):
              data = None if payload is None else json.dumps(payload).encode()
              request = urllib.request.Request(
                  url,
                  data=data,
                  headers={**headers, 'Content-Type': 'application/json'},
                  method=method,
              )
              try:
                  with urllib.request.urlopen(request) as response:
                      return json.load(response)
              except urllib.error.HTTPError as exc:
                  detail = exc.read().decode('utf-8', 'replace')
                  print(f'GitHub API {method} {url} failed: HTTP {exc.code} {exc.reason}')
                  if detail:
                      print(detail)
                  raise

          query = urllib.parse.urlencode({'state': 'open', 'head': f'{owner}:{branch}', 'base': 'main'})
          pulls = req('GET', f'{api}/pulls?{query}')
          if pulls:
              pr = req('PATCH', f"{api}/pulls/{pulls[0]['number']}", {'title': title, 'body': body})
          else:
              pr = req('POST', f'{api}/pulls', {'title': title, 'body': body, 'head': branch, 'base': 'main'})
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f"pull-request-number={pr['number']}\n")
          print(f"Prepared PR #{pr['number']}: {pr['html_url']}")
          PYEOF
