name: Release Penpot LPK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish LPK
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install lzc-cli
        run: npm install -g @lazycatcloud/lzc-cli@2.0.8

      - name: Build and publish LPK
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/release-lpk.sh

      - name: Print release summary
        run: |
          echo "Release tag: ${{ steps.release.outputs.TAG }}"
          echo "LPK: ${{ steps.release.outputs.LPK }}"
          echo "SHA256: ${{ steps.release.outputs.SHA256 }}"
          echo "Size: ${{ steps.release.outputs.SIZE }} bytes"
