application:
  subdomain: penpot
  multi_instance: false
  routes:
    - /mcp=http://penpot-frontend:8080
    - /=http://penpot-frontend:8080
  public_path:
    - /
  envs:
    - PENPOT_ADMIN_EMAIL='admin@qq.com'
    - PENPOT_ADMIN_PASSWORD='admin123'
  setup_script: |
    #!/bin/sh
    # 修复 assets 目录权限（LazyCat 默认 root 所有权，penpot 用户 uid=1001 无法写入）
    chown 1001:1001 /lzcapp/var/data 2>/dev/null || true
  health_check:
    test_url: http://penpot-frontend:8080/readyz
    start_period: 300s
    timeout: 5s
services:
  penpot-frontend:
    image: registry.cn-shanghai.aliyuncs.com/wtjking/penpot-frontend:2.16.2
    binds:
      - /lzcapp/var/data:/opt/data/assets
    environment:
      - PENPOT_FLAGS=disable-email-verification enable-prepl-server enable-mcp disable-secure-session-cookies
    depends_on:
      - penpot-backend
      - penpot-exporter
    health_check:
      test:
        - CMD-SHELL
        - "curl -f http://localhost:8080/readyz || exit 1"
      interval: 10s
      timeout: 5s
      start_period: 120s
  penpot-backend:
    image: registry.cn-shanghai.aliyuncs.com/wtjking/penpot-backend:2.16.2
    command: /bin/bash /lzcapp/pkg/content/backend-entrypoint.sh
    environment:
      - PENPOT_FLAGS=disable-email-verification enable-prepl-server enable-mcp disable-secure-session-cookies
      - PENPOT_SREPL_HOST=0.0.0.0
      - PENPOT_SECRET_KEY=penpot-lazycat-secret-key-change-in-production
      - PENPOT_ADMIN_EMAIL=admin@qq.com
      - PENPOT_ADMIN_PASSWORD=admin123
      - PENPOT_ADMIN_FULLNAME=Admin
      - PENPOT_PUBLIC_URI=https://${LAZYCAT_APP_DOMAIN}
      - PENPOT_DATABASE_URI=postgresql://penpot-postgres/penpot
      - PENPOT_DATABASE_USERNAME=penpot
      - PENPOT_DATABASE_PASSWORD=penpot
      - PENPOT_REDIS_URI=redis://penpot-redis/0
      - PENPOT_OBJECTS_STORAGE_BACKEND=fs
      - PENPOT_OBJECTS_STORAGE_FS_DIRECTORY=/opt/data/assets
      - PENPOT_TELEMETRY_ENABLED=true
      - PENPOT_DATABASE_MIN_SIZE=5
      - PENPOT_DATABASE_MAX_SIZE=25
    depends_on:
      - penpot-postgres
      - penpot-redis
    binds:
      - /lzcapp/var/data:/opt/data/assets
    health_check:
      test:
        - CMD-SHELL
        - "curl -f http://localhost:6060/readyz || exit 1"
      interval: 10s
      timeout: 5s
      start_period: 120s
  penpot-exporter:
    image: registry.cn-shanghai.aliyuncs.com/wtjking/penpot-exporter:2.16.2
    environment:
      - PENPOT_PUBLIC_URI=http://penpot-frontend:8080
      - PENPOT_SECRET_KEY=penpot-lazycat-secret-key-change-in-production
      - PENPOT_REDIS_URI=redis://penpot-redis/0
    health_check:
      test:
        - CMD-SHELL
        - "curl -f http://localhost:6061/readyz || exit 1"
      interval: 10s
      timeout: 5s
      start_period: 60s
  penpot-mcp:
    image: registry.cn-shanghai.aliyuncs.com/wtjking/penpot-mcp:2.16.2
    depends_on:
      - penpot-backend
    health_check:
      test:
        - CMD-SHELL
        - "curl -s --max-time 3 http://localhost:4401/mcp || exit 1"
      interval: 10s
      timeout: 10s
      start_period: 15s
  penpot-postgres:
    image: registry.cn-shanghai.aliyuncs.com/wtjking/postgres:16-alpine
    command: -c max_connections=300
    environment:
      - POSTGRES_INITDB_ARGS=--data-checksums
      - POSTGRES_DB=penpot
      - POSTGRES_USER=penpot
      - POSTGRES_PASSWORD=penpot
    binds:
      - /lzcapp/var/db:/var/lib/postgresql/data
    health_check:
      test:
        - CMD-SHELL
        - "pg_isready -U penpot -d penpot"
      interval: 10s
      timeout: 5s
      start_period: 30s
  penpot-redis:
    image: registry.cn-shanghai.aliyuncs.com/wtjking/redis:7-alpine
    health_check:
      test:
        - CMD-SHELL
        - "redis-cli ping"
      interval: 10s
      timeout: 5s
      start_period: 10s
