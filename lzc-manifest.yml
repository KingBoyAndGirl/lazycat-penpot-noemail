name: penpot
package: io.zeroc.app.penpot
version: 0.0.1
description: 用于设计和代码协作的开源设计工具（无邮件版，PREPL 创建管理员）
license: https://choosealicense.com/licenses/mit/
homepage: https://github.com/penpot/penpot
author: penpot / 王.W
application:
  subdomain: penpot
  privileged: true
  multi_instance: true
  routes:
    - /=http://penpot-frontend:80
  public_path:
    - /
  health_check:
    test_url: http://penpot-frontend:80/readyz
    start_period: 300s
    timeout: 5s
services:
  penpot-frontend:
    image: registry.cn-shanghai.aliyuncs.com/wtjking/penpot-frontend:2.16.2
    environment:
      - PENPOT_FLAGS=disable-email-verification enable-prepl-server enable-mcp disable-secure-session-cookies
    depends_on:
      - penpot-backend
      - penpot-exporter
    health_check:
      test:
        - CMD-SHELL
        - "curl -f http://localhost/readyz || exit 1"
      interval: 10s
      timeout: 5s
      start_period: 120s

  penpot-backend:
    image: registry.cn-shanghai.aliyuncs.com/wtjking/penpot-backend:2.16.2
    environment:
      - PENPOT_FLAGS=disable-email-verification enable-prepl-server enable-mcp disable-secure-session-cookies
      - PENPOT_PUBLIC_URI=http://${LAZYCAT_APP_ORIGIN}
      - PENPOT_DATABASE_URI=postgresql://penpot-postgres/penpot
      - PENPOT_DATABASE_USERNAME=penpot
      - PENPOT_DATABASE_PASSWORD=penpot
      - PENPOT_REDIS_URI=redis://penpot-redis/0
      - PENPOT_ASSETS_STORAGE_BACKEND=assets-fs
      - PENPOT_STORAGE_ASSETS_FS_DIRECTORY=/opt/data/assets
      - PENPOT_TELEMETRY_ENABLED=true
    depends_on:
      - penpot-postgres
      - penpot-redis
    binds:
      - /lzcapp/var/data:/opt/data/assets
    health_check:
      test:
        - CMD-SHELL
        - "curl -f http://localhost:6060/readyz || exit 1"
      interval: 10s
      timeout: 5s
      start_period: 120s

  penpot-exporter:
    image: registry.cn-shanghai.aliyuncs.com/wtjking/penpot-exporter:2.16.2
    environment:
      - PENPOT_PUBLIC_URI=http://penpot-frontend
      - PENPOT_REDIS_URI=redis://penpot-redis/0
    health_check:
      test:
        - CMD-SHELL
        - "curl -f http://localhost:6061/readyz || exit 1"
      interval: 10s
      timeout: 5s
      start_period: 60s

  penpot-postgres:
    image: registry.cn-shanghai.aliyuncs.com/wtjking/postgres:16-alpine
    environment:
      - POSTGRES_INITDB_ARGS=--data-checksums
      - POSTGRES_DB=penpot
      - POSTGRES_USER=penpot
      - POSTGRES_PASSWORD=penpot
    binds:
      - /lzcapp/var/db:/var/lib/postgresql/data
    health_check:
      test:
        - CMD-SHELL
        - "pg_isready -U penpot -d penpot"
      interval: 10s
      timeout: 5s
      start_period: 30s

  penpot-redis:
    image: registry.cn-shanghai.aliyuncs.com/wtjking/redis:7-alpine
    health_check:
      test:
        - CMD-SHELL
        - "redis-cli ping"
      interval: 10s
      timeout: 5s
      start_period: 10s

  penpot-init:
    image: registry.cn-shanghai.aliyuncs.com/wtjking/penpot-backend:2.16.2
    depends_on:
      penpot-backend:
        condition: service_healthy
    entrypoint: ["python3", "/scripts/init-admin.py"]
    restart: "no"

unsupported_platforms:
  - ios
  - android
