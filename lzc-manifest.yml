application:
  subdomain: penpot
  multi_instance: true
  routes:
    - /mcp=http://penpot-frontend:8080
    - /=http://penpot-frontend:8080
  public_path:
    - /
  envs:
    - PENPOT_ADMIN_EMAIL='{{ index .U "login_user" }}'
    - PENPOT_ADMIN_PASSWORD='{{ index .U "login_password" }}'
  injects:
    # request 阶段：抓取登录请求里的邮箱和密码
    - id: penpot-capture-login
      auth_required: false
      on: request
      when:
        - /api/rpc/command/login-with-password
      do: |
        let payload = null;
        try { payload = ctx.body.getJSON(); } catch { payload = null; }
        if (!payload || typeof payload !== "object") return;
        const email = payload.email || payload["~:email"] || "";
        const password = payload.password || payload["~:password"] || "";
        if (email) ctx.flow.set("penpot_email", email);
        if (password) ctx.flow.set("penpot_password", password);
    # response 阶段：登录成功才持久化
    - id: penpot-commit-login
      auth_required: false
      on: response
      when:
        - /api/rpc/command/login-with-password
      do: |
        if (ctx.status < 200 || ctx.status >= 300) return;
        const email = ctx.flow.get("penpot_email");
        const password = ctx.flow.get("penpot_password");
        if (typeof email === "string" && email.length > 0) {
          ctx.persist.set("penpot.email", email);
        }
        if (typeof password === "string" && password.length > 0) {
          ctx.persist.set("penpot.password", password);
        }
    # browser 阶段：登录页自动填充（优先用持久化的，回退到部署参数）
    - id: penpot-login-autofill
      when:
        - /#/auth/login
      do:
        - src: builtin://simple-inject-password
          params:
            user:
              $persist: penpot.email
              default: '{{ index .U "login_user" }}'
            password:
              $persist: penpot.password
              default: '{{ index .U "login_password" }}'
            autoSubmit: true
            submitMode: enter
            submitDelayMs: 800
            debug: true
  setup_script: |
    #!/bin/sh
    echo "[setup] Waiting for penpot-backend PREPL..."
    for i in $(seq 1 60); do
      printf '{"cmd":"echo","params":{}}\n' | nc -w 2 penpot-backend 6063 >/dev/null 2>&1 && break
      sleep 2
    done
    echo "[setup] Creating admin account..."
    printf '{"cmd":"create-profile","params":{"fullname":"Admin","email":"%s","password":"%s"}}\n' "$PENPOT_ADMIN_EMAIL" "$PENPOT_ADMIN_PASSWORD" | nc -w 5 penpot-backend 6063
    echo "[setup] Init done"
  health_check:
    test_url: http://penpot-frontend:8080/readyz
    start_period: 300s
    timeout: 5s
services:
  penpot-frontend:
    image: registry.cn-shanghai.aliyuncs.com/wtjking/penpot-frontend:2.16.2
    environment:
      - PENPOT_FLAGS=disable-email-verification enable-prepl-server enable-mcp disable-secure-session-cookies
    depends_on:
      - penpot-backend
      - penpot-exporter
    health_check:
      test:
        - CMD-SHELL
        - "curl -f http://localhost:8080/readyz || exit 1"
      interval: 10s
      timeout: 5s
      start_period: 120s
  penpot-backend:
    image: registry.cn-shanghai.aliyuncs.com/wtjking/penpot-backend:2.16.2
    environment:
      - PENPOT_FLAGS=disable-email-verification enable-prepl-server enable-mcp disable-secure-session-cookies
      - PENPOT_SREPL_HOST=0.0.0.0
      - PENPOT_SECRET_KEY=penpot-lazycat-secret-key-change-in-production
      - PENPOT_PUBLIC_URI=http://penpot-frontend
      - PENPOT_DATABASE_URI=postgresql://penpot-postgres/penpot
      - PENPOT_DATABASE_USERNAME=penpot
      - PENPOT_DATABASE_PASSWORD=penpot
      - PENPOT_REDIS_URI=redis://penpot-redis/0
      - PENPOT_OBJECTS_STORAGE_BACKEND=fs
      - PENPOT_OBJECTS_STORAGE_FS_DIRECTORY=/opt/data/assets
      - PENPOT_TELEMETRY_ENABLED=true
      - PENPOT_DATABASE_MIN_SIZE=5
      - PENPOT_DATABASE_MAX_SIZE=25
    depends_on:
      - penpot-postgres
      - penpot-redis
    binds:
      - /lzcapp/var/data:/opt/data/assets
    health_check:
      test:
        - CMD-SHELL
        - "curl -f http://localhost:6060/readyz || exit 1"
      interval: 10s
      timeout: 5s
      start_period: 120s
  penpot-exporter:
    image: registry.cn-shanghai.aliyuncs.com/wtjking/penpot-exporter:2.16.2
    environment:
      - PENPOT_PUBLIC_URI=http://penpot-frontend:8080
      - PENPOT_SECRET_KEY=penpot-lazycat-secret-key-change-in-production
      - PENPOT_REDIS_URI=redis://penpot-redis/0
    health_check:
      test:
        - CMD-SHELL
        - "curl -f http://localhost:6061/readyz || exit 1"
      interval: 10s
      timeout: 5s
      start_period: 60s
  penpot-mcp:
    image: registry.cn-shanghai.aliyuncs.com/wtjking/penpot-mcp:2.16.2
    depends_on:
      - penpot-backend
    health_check:
      test:
        - CMD-SHELL
        - "curl -s --max-time 3 http://localhost:4401/mcp || exit 1"
      interval: 10s
      timeout: 10s
      start_period: 15s
  penpot-postgres:
    image: registry.cn-shanghai.aliyuncs.com/wtjking/postgres:16-alpine
    command: -c max_connections=300
    environment:
      - POSTGRES_INITDB_ARGS=--data-checksums
      - POSTGRES_DB=penpot
      - POSTGRES_USER=penpot
      - POSTGRES_PASSWORD=penpot
    binds:
      - /lzcapp/var/db:/var/lib/postgresql/data
    health_check:
      test:
        - CMD-SHELL
        - "pg_isready -U penpot -d penpot"
      interval: 10s
      timeout: 5s
      start_period: 30s
  penpot-redis:
    image: registry.cn-shanghai.aliyuncs.com/wtjking/redis:7-alpine
    health_check:
      test:
        - CMD-SHELL
        - "redis-cli ping"
      interval: 10s
      timeout: 5s
      start_period: 10s
